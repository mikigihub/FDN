<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en tu cuenta</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Fondo para GitHub Pages */
            background-image: url('fondo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #ebeeef; 
        }

        .login-box {
            background: rgba(255, 255, 255, 0.96); 
            width: 440px;
            padding: 44px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            border-radius: 0px; 
        }

        .logo-container {
            margin-bottom: 24px;
            text-align: left;
        }

        .logo-placeholder {
            max-height: 45px; 
            max-width: 100%;
            object-fit: contain;
        }

        .brand-text {
            font-size: 20px;
            font-weight: 600;
            color: #444;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1b1b1b;
            margin: 0 0 16px 0;
            text-align: left;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 6px 10px;
            font-size: 15px;
            border: none;
            border-bottom: 1px solid #605e5c; 
            outline: none;
            transition: border-color 0.2s;
            margin-top: 4px;
            background: transparent;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus {
            border-bottom: 2px solid #0067b8; 
        }

        .links-container {
            margin: 12px 0 28px 0;
            text-align: left;
            font-size: 13px;
        }

        .links-container a {
            color: #0067b8;
            text-decoration: none;
        }

        .links-container a:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            justify-content: flex-end; 
        }

        button {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 6px 20px;
            font-size: 15px;
            min-width: 108px;
            height: 32px;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        button:hover {
            background-color: #005da6;
        }

        .footer-text {
            font-size: 11px;
            color: #605e5c;
            margin-top: 35px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-box">
        
        <div class="logo-container">
            <img src="logo.png" alt="FDN" class="logo-placeholder" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';">
            <span id="text-logo" class="brand-text" style="display:none;">FDN</span>
        </div>

        <h2>Iniciar sesión</h2>

        <form onsubmit="event.preventDefault(); alert('Simulación de acceso corporativo');">
            
            <div class="input-group">
                <input type="text" placeholder="Correo electrónico, teléfono o Skype" required autocomplete="username">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>

            <div class="links-container">
                <a href="#">¿No puede acceder a su cuenta?</a>
            </div>

            <div class="button-group">
                <button type="submit">Iniciar sesión</button>
            </div>
        </form>

        <p class="footer-text">
            Usted está ingresando a los servicios de colaboración de la Financiera de Desarrollo Nacional. Recuerde que su uso está sujeto a las políticas y controles de seguridad dispuestos por la organización. Entorno controlado por FDN | Ciberseguridad.
        </p>
    </div>

</body>
</html>
