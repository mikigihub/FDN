<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en tu cuenta</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo sutil gris/azul de Microsoft, puedes cambiarlo por una imagen de fondo si prefieres */
            background-color: #ebeeef; 
            background-image: linear-gradient(135deg, #f3f2f1 0%, #e1dfdd 100%);
        }

        .login-box {
            background: #ffffff;
            width: 440px;
            padding: 44px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border-radius: 0px; /* Microsoft usa esquinas completamente rectas o con un radio mínimo de 2px */
        }

        .logo-container {
            margin-bottom: 20px;
            text-align: left;
        }

        .logo-placeholder {
            max-height: 36px;
            max-width: 100%;
            object-fit: contain;
        }

        /* Si no tienes el logo en imagen, este texto simula el estilo */
        .brand-text {
            font-size: 18px;
            font-weight: 600;
            color: #444;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1b1b1b;
            margin: 0 0 16px 0;
            text-align: left;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 6px 10px;
            font-size: 15px;
            border: none;
            border-bottom: 1px solid #605e5c; /* Línea inferior típica de Microsoft */
            outline: none;
            transition: border-color 0.2s;
            margin-top: 4px;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus {
            border-bottom: 2px solid #0067b8; /* Azul clásico de Microsoft */
        }

        .links-container {
            margin: 12px 0 28px 0;
            text-align: left;
            font-size: 13px;
        }

        .links-container a {
            color: #0067b8;
            text-decoration: none;
        }

        .links-container a:hover {
            text-decoration: underline;
        }

        .button-group {
            display: flex;
            justify-content: flex-end; /* Alinea el botón a la derecha como Microsoft */
        }

        button {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 6px 20px;
            font-size: 15px;
            min-width: 108px;
            height: 32px;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        button:hover {
            background-color: #005da6;
        }

        .footer-text {
            font-size: 11px;
            color: #605e5c;
            margin-top: 35px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-container">
            <img src="logo_fdn.png" alt="FDN" class="logo-placeholder" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';">
            <span id="text-logo" class="brand-text" style="display:none;">FDN</span>
        </div>

        <h2>Iniciar sesión</h2>

        <form onsubmit="event.preventDefault(); alert('Simulación de acceso corporativo');">
            
            <div class="input-group">
                <input type="text" placeholder="Correo electrónico, teléfono o Skype" required autocomplete="username">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>

            <div class="links-container">
                <a href="#">¿No puede acceder a su cuenta?</a>
            </div>

            <div class="button-group">
                <button type="submit">Iniciar sesión</button>
            </div>
        </form>

        <p class="footer-text">
            Entorno de prueba controlado · FDN 2026
        </p>
    </div>

</body>
</html>
